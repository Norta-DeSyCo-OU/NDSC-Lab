name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ndsc
          POSTGRES_PASSWORD: ndsc
          POSTGRES_DB: ndsc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ndsc -d ndsc"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: System deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev libjpeg-turbo8 libopenjp2-7 shared-mime-info fonts-dejavu

      - name: Install backend
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: apps/api
        run: ruff check .

      - name: Mypy
        working-directory: apps/api
        run: mypy app

      - name: Pytest
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://ndsc:ndsc@localhost:5432/ndsc
          REDIS_URL: redis://localhost:6379/0
          R2_ENDPOINT_URL: http://localhost:9000
          R2_ACCESS_KEY_ID: x
          R2_SECRET_ACCESS_KEY: x
          R2_HOT_BUCKET: x
          R2_COLD_BUCKET: x
          AUTH_PASSWORD_PEPPER: test-pepper
          AUDIT_HMAC_KEY: test-key
          SESSION_SIGNING_KEY: test-key
        run: pytest --cov=app --cov-report=xml

      - name: pip-audit
        working-directory: apps/api
        run: |
          pip install pip-audit
          pip-audit -r <(pip freeze) || true

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install
        working-directory: apps/web
        run: npm ci || npm install
      - name: Lint
        working-directory: apps/web
        run: npm run lint --if-present || true
      - name: Type check
        working-directory: apps/web
        run: npm run type-check
      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      - name: npm audit (high+)
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high || true

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ""

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten p/security-audit p/python p/typescript p/react p/secrets

      - name: Trivy (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
