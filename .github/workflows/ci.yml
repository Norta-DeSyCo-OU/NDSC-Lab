name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ndsc
          POSTGRES_PASSWORD: ndsc
          POSTGRES_DB: ndsc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ndsc -d ndsc"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: System deps for WeasyPrint
        # Package names match Ubuntu 24.04 (noble). `libjpeg-turbo8` was
        # dropped in the t64 transition — Pillow ships its own JPEG lib so we
        # don't need it for the unit-test path anyway.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev libopenjp2-7 shared-mime-info fonts-dejavu

      - name: Install backend
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: apps/api
        run: ruff check .

      - name: Mypy (non-blocking)
        working-directory: apps/api
        run: mypy app || true

      - name: Pytest (unit tests only — integration suite runs in compose)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://ndsc:ndsc@localhost:5432/ndsc
          REDIS_URL: redis://localhost:6379/0
          R2_ENDPOINT_URL: http://localhost:9000
          R2_ACCESS_KEY_ID: x
          R2_SECRET_ACCESS_KEY: x
          R2_HOT_BUCKET: x
          R2_COLD_BUCKET: x
          AUTH_PASSWORD_PEPPER: test-pepper
          AUDIT_HMAC_KEY: test-key
          SESSION_SIGNING_KEY: test-key
        run: pytest --cov=app --cov-report=xml --ignore=tests/integration

      - name: pip-audit
        working-directory: apps/api
        run: |
          pip install pip-audit
          pip-audit -r <(pip freeze) || true

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "22" }
      - name: Install
        working-directory: apps/web
        run: npm ci || npm install
      - name: Lint
        working-directory: apps/web
        run: npm run lint --if-present || true
      - name: Type check
        working-directory: apps/web
        run: npm run type-check
      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      - name: npm audit (high+)
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high || true

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: gitleaks (self-hosted binary, no license required)
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --redact --no-banner --exit-code 1 --source .

      - name: Semgrep (pip-installed, non-blocking)
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep --config p/owasp-top-ten --config p/security-audit \
                  --config p/python --config p/typescript --config p/react \
                  --config p/secrets --error || echo "semgrep findings (non-blocking)"

      - name: Trivy (self-installed, non-blocking)
        run: |
          TRIVY_VERSION=0.70.0
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          /tmp/trivy fs --severity HIGH,CRITICAL --ignore-unfixed --format table . || echo "trivy findings (non-blocking)"
