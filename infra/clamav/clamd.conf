###
### NDSC Lab clamd.conf — raised limits so multi-gig uploads still get scanned.
### Mounted into the ClamAV container at /etc/clamav/clamd.conf.
###

LogFile /var/log/clamav/clamd.log
LogTime yes
LogClean no
LogVerbose no

PidFile /run/clamav/clamd.pid
LocalSocket /run/clamav/clamd.sock
TCPSocket 3310
TCPAddr 0.0.0.0
MaxConnectionQueueLength 50

DatabaseDirectory /var/lib/clamav

# === Limit overrides ===
# Stream scans (what pyclamd uses): allow up to 4 GB per stream.
StreamMaxLength 4G

# Per-file scan limits — bump generously.
MaxFileSize 4G
MaxScanSize 4G
MaxRecursion 10
MaxFiles 10000
MaxEmbeddedPE 1G

# Reasonable scan timeout.
MaxScanTime 600000

# Heuristics + scanning behavior.
ScanArchive yes
ScanMail no
ScanHTML yes
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
DetectPUA no
HeuristicScanPrecedence no

User clamav
SelfCheck 600
